name: Update FX currency premia and dealer positions

on:
  workflow_dispatch:
  schedule:
    - cron: "15 8 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore source cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: fx-premia-source-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fx-premia-source-cache-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis pipeline
        run: |
          python fetch_ecb_spf_expectations.py
          python fetch_bcb_focus_expectations.py
          python fx_analysis.py

      - name: Commit refreshed outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update FX currency premia analysis"
          file_pattern: "data/*.csv chart/fx_dealer_positions_summary.png README.md fx_analysis.py fetch_ecb_spf_expectations.py fetch_bcb_focus_expectations.py requirements.txt"
